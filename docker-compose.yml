version: '3'

services:
  # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - awesome-iguana-network
    volumes:
      - ./frontend:/app
      - node_modules_frontend:/app/node_modules

  # RepairGPT service
  repairgpt:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ${NEO4J_ENV_FILE:-./Neo4j-6522133f-Created-2026-03-16.txt}
    networks:
      - awesome-iguana-network

  # VulGPT_OSV service
  vulgpt:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ${NEO4J_ENV_FILE:-./Neo4j-6522133f-Created-2026-03-16.txt}
    networks:
      - awesome-iguana-network
    command: ["python", "vulgpt_osv/osv.py"]

  # Ollama (local LLM runtime)
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11435:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - awesome-iguana-network

  # Caddy for reverse proxy
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - awesome-iguana-network

networks:
  awesome-iguana-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  ollama_data:
  node_modules_frontend:
